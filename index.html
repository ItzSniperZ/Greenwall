<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greenwall — Greenhouse Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════
       DESIGN SYSTEM — LIGHT / WHITE, VERTICAL
       ═══════════════════════════════════════════ */
    :root {
      --bg:          #f4f7f4;
      --bg-2:        #edf2ed;
      --panel:       #ffffff;
      --panel-2:     #f8fbf8;
      --border:      #dde8dd;
      --border-2:    #ccdacc;

      --green:       #1a7a3a;
      --green-light: #e6f5ec;
      --green-mid:   #2ea65a;

      --red:         #c0392b;
      --red-light:   #fdecea;

      --amber:       #b45309;
      --amber-light: #fef3e2;

      --blue:        #1565c0;
      --blue-light:  #e8f0fe;

      --text:        #111a11;
      --text-2:      #3a4f3a;
      --text-3:      #6b856b;

      --mono:        'Space Mono', monospace;
      --sans:        'Syne', sans-serif;
      --radius:      8px;
      --radius-lg:   14px;
      --shadow:      0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.05);
      --shadow-hover:0 2px 8px rgba(0,0,0,0.12), 0 8px 24px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── HEADER ─── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--panel);
      border-bottom: 2px solid var(--border-2);
      padding: 0 28px;
      height: 72px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .logo {
      display: flex; align-items: center; gap: 14px;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: var(--green-light);
      border: 1.5px solid var(--green);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .logo h1 {
      font-family: var(--sans);
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--green);
    }

    .logo span {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: 1px;
      display: block;
      margin-top: -2px;
    }

    .header-right {
      display: flex; align-items: center; gap: 18px;
    }

    .live-badge {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--green);
      letter-spacing: 1px;
      background: var(--green-light);
      border: 1px solid var(--green-mid);
      border-radius: 20px;
      padding: 5px 14px;
    }

    .live-dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(26,122,58,0.3); }
      50%       { opacity: 0.6; box-shadow: 0 0 0 4px rgba(26,122,58,0); }
    }

    .timestamp {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text-3);
    }

    /* ─── MAIN — full width, vertical monitor ─── */
    main {
      position: relative; z-index: 1;
      padding: 20px;
      display: flex; flex-direction: column; gap: 18px;
    }

    /* ─── ALERTS BAR ─── */
    #alerts-bar {
      display: flex; gap: 8px; flex-wrap: wrap;
    }

    .alert-chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--red-light);
      border: 1.5px solid var(--red);
      border-radius: 20px;
      padding: 4px 11px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--red);
      font-weight: 700;
      animation: alertPulse 2.5s ease-in-out infinite;
    }

    @keyframes alertPulse {
      0%, 100% { border-color: var(--red); }
      50%       { border-color: #e8a09a; }
    }

    /* ─── SECTION CARD ─── */
    .section-card {
      background: var(--panel);
      border: 1.5px solid var(--border-2);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .section-card:hover {
      box-shadow: var(--shadow-hover);
      border-color: var(--green-mid);
    }

    .section-card.offline { opacity: 0.45; }

    .section-header {
      padding: 18px 24px;
      border-bottom: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--panel-2);
    }

    .section-title {
      display: flex; align-items: center; gap: 14px;
    }

    .section-num {
      width: 44px; height: 44px;
      background: var(--green);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-size: 17px;
      font-weight: 700;
      color: #fff;
    }

    .section-label h2 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text);
    }

    .section-label p {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
      margin-top: 2px;
    }

    .status-badge {
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 20px;
      letter-spacing: 1px;
      font-weight: 700;
    }

    .status-badge.online {
      background: var(--green-light);
      color: var(--green);
      border: 1px solid var(--green-mid);
    }

    .status-badge.offline {
      background: #f0f0f0;
      color: #999;
      border: 1px solid #ddd;
    }

    /* ─── SECTION METRICS ROW ─── */
    .section-metrics {
      display: flex;
      border-bottom: 1.5px solid var(--border);
    }

    .metric {
      flex: 1;
      padding: 14px 20px;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 5px;
    }

    .metric:last-child { border-right: none; }

    .metric-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .metric-value {
      font-family: var(--mono);
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .metric-unit {
      font-size: 13px;
      color: var(--text-3);
      font-weight: 400;
    }

    .metric-bar {
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      margin-top: 4px;
      overflow: hidden;
    }

    .metric-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--green);
      transition: width 0.6s ease;
    }

    .pump-on  { color: var(--blue) !important; }
    .pump-off { color: var(--text-3) !important; }

    /* ─── CELLS GRID — 3 columns ─── */
    .cells-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      background: var(--border);
    }

    /* ─── CELL CARD ─── */
    .cell-card {
      background: var(--panel);
      padding: 16px 18px;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
      border-top: 1px solid var(--border);
    }

    .cell-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: transparent;
      transition: background 0.2s;
    }

    .cell-card:hover { background: var(--panel-2); }
    .cell-card:hover::after { background: var(--green); }

    .cell-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }

    .cell-num {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text-3);
      text-transform: uppercase;
      font-weight: 700;
    }

    .moist-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .moist-dot.dry     { background: var(--red);   box-shadow: 0 0 0 3px var(--red-light); }
    .moist-dot.optimal { background: var(--green);  box-shadow: 0 0 0 3px var(--green-light); }
    .moist-dot.wet     { background: var(--blue);   box-shadow: 0 0 0 3px var(--blue-light); }

    .cell-readings {
      display: flex; flex-direction: column; gap: 0;
    }

    .reading-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
    }

    .reading-row:last-child { border-bottom: none; }

    .reading-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 5px;
    }

    .reading-val {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .reading-val.warn   { color: var(--amber); }
    .reading-val.danger { color: var(--red); }

    .moist-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .moist-bar-fill {
      height: 100%; border-radius: 4px;
      transition: width 0.6s ease, background 0.3s;
    }

    /* ─── ERROR NOTICE ─── */
    .error-notice {
      background: var(--amber-light);
      border: 1.5px solid var(--amber);
      color: var(--amber);
      border-radius: var(--radius);
      padding: 9px 14px;
      font-family: var(--mono);
      font-size: 11px;
      display: none;
    }

    .error-notice.show { display: block; }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: fadeIn 0.2s ease;
    }

    .modal-overlay.hidden { display: none; }

    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

    .modal {
      background: var(--panel);
      border: 1.5px solid var(--border-2);
      border-radius: var(--radius-lg);
      width: 100%; max-width: 480px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      animation: slideUp 0.22s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(16px); opacity: 0 }
      to   { transform: translateY(0); opacity: 1 }
    }

    .modal-header {
      padding: 18px 22px;
      background: var(--panel-2);
      border-bottom: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }

    .modal-header h3 {
      font-size: 14px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--text);
    }

    .modal-close {
      background: none; border: 1.5px solid var(--border-2);
      color: var(--text-3); cursor: pointer;
      width: 28px; height: 28px;
      border-radius: var(--radius); font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }

    .modal-close:hover {
      border-color: var(--red); color: var(--red);
      background: var(--red-light);
    }

    .modal-body {
      padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
    }

    .modal-stat-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    }

    .modal-stat {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 12px; text-align: center;
    }

    .modal-stat .s-label {
      font-family: var(--mono); font-size: 8px;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-3); margin-bottom: 8px;
    }

    .modal-stat .s-val {
      font-family: var(--mono); font-size: 24px;
      font-weight: 700; line-height: 1;
    }

    .modal-stat .s-unit { font-size: 12px; color: var(--text-3); }

    .modal-stat .s-note {
      font-family: var(--mono); font-size: 8px;
      color: var(--text-3); margin-top: 6px;
    }

    .chart-placeholder {
      background: var(--bg);
      border: 1.5px dashed var(--border-2);
      border-radius: var(--radius); height: 100px;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 5px;
      color: var(--text-3); font-family: var(--mono); font-size: 10px;
    }

    .chart-placeholder span { font-size: 20px; opacity: 0.5; }

    /* ─── LOADING ─── */
    .loading-screen {
      position: fixed; inset: 0; z-index: 300;
      background: var(--panel);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
      transition: opacity 0.4s;
    }

    .loading-screen.done { opacity: 0; pointer-events: none; }

    .loading-logo {
      font-family: var(--sans); font-size: 28px;
      font-weight: 800; letter-spacing: 4px; color: var(--green);
    }

    .loading-bar-wrap {
      width: 160px; height: 3px;
      background: var(--border); border-radius: 2px; overflow: hidden;
    }

    .loading-bar-fill {
      height: 100%; background: var(--green); border-radius: 2px;
      animation: loadBar 1.4s ease forwards;
    }

    @keyframes loadBar { from { width: 0 } to { width: 100% } }

    .loading-sub {
      font-family: var(--mono); font-size: 10px;
      color: var(--text-3); letter-spacing: 2px;
    }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loading-screen">
  <div class="loading-logo">🌿 GREENWALL</div>
  <div class="loading-bar-wrap"><div class="loading-bar-fill"></div></div>
  <div class="loading-sub">INITIALIZING SENSORS</div>
</div>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">🌿</div>
    <div>
      <h1>Greenwall</h1>
      <span>GREENHOUSE MONITORING SYSTEM</span>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
    <div class="timestamp" id="timestamp">--:--:--</div>
  </div>
</header>

<main>
  <div class="error-notice" id="error-notice">
    ⚠ Cannot reach the Flask backend — make sure app.py is running on the Pi. Showing demo data.
  </div>

  <div id="alerts-bar"></div>

  <!-- Sections in 2x2 grid -->
  <div id="sections-grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px;"></div>
</main>

<!-- Cell Detail Modal -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Cell Detail</h3>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-stat-grid" id="modal-stats"></div>
      <div class="chart-placeholder">
        <span>📈</span>
        Historical charts — coming soon
      </div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───
// Empty string = same host that served this page (the Pi's Flask server).
// This works automatically whether you're on the Pi itself or
// accessing remotely from another device on the network.
const API_BASE  = "";
const REFRESH_MS = 3000;

let allData = [];
let useDemoData = false;

// ─── THRESHOLDS ───
const TEMP_LOW = 18, TEMP_HIGH = 28;
const MOIST_DRY = 700, MOIST_WET = 400;

function moistureClass(raw) {
  if (raw > MOIST_DRY) return "dry";
  if (raw < MOIST_WET) return "wet";
  return "optimal";
}

function moistPct(raw) {
  return Math.round(((1023 - Math.max(0, Math.min(1023, raw))) / 1023) * 100);
}

function moistColor(cls) {
  return cls === "dry" ? "var(--red)" : cls === "wet" ? "var(--blue)" : "var(--green)";
}

function tempClass(t) {
  if (t < TEMP_LOW - 3 || t > TEMP_HIGH + 3) return "danger";
  if (t < TEMP_LOW || t > TEMP_HIGH) return "warn";
  return "";
}

// ─── DEMO DATA ───
function makeDemoData() {
  const r = (a, b) => +(Math.random() * (b - a) + a).toFixed(1);
  return [1,2,3,4].map(id => ({
    board_id: id, online: true,
    last_updated: new Date().toISOString(),
    light: r(30, 95), aqi: r(10, 80),
    pump: Math.random() < 0.2 ? 1 : 0,
    cells: [1,2,3,4,5,6].map(c => ({
      cell: c, temp: r(17, 32), hum: r(40, 80),
      moist: Math.floor(Math.random() * 700 + 200),
    }))
  }));
}

// ─── FETCH ───
async function fetchData() {
  if (useDemoData) { allData = makeDemoData(); renderAll(); return; }
  try {
    const res = await fetch(`${API_BASE}/api/data`, { signal: AbortSignal.timeout(4000) });
    if (!res.ok) throw new Error();
    allData = await res.json();
    document.getElementById("error-notice").classList.remove("show");
    renderAll();
  } catch {
    document.getElementById("error-notice").classList.add("show");
    useDemoData = true; allData = makeDemoData(); renderAll();
  }
}

// ─── RENDER ───
function renderAll() {
  renderSections(); renderAlerts();
  document.getElementById("timestamp").textContent = new Date().toLocaleTimeString();
}

function renderAlerts() {
  const bar = document.getElementById("alerts-bar");
  const alerts = [];
  allData.forEach(s => {
    s.cells?.forEach(c => {
      const mc = moistureClass(c.moist);
      if (mc === "dry") alerts.push(`S${s.board_id}·C${c.cell}: Soil dry`);
      if (mc === "wet") alerts.push(`S${s.board_id}·C${c.cell}: Overwatered`);
      if (tempClass(c.temp) === "danger") alerts.push(`S${s.board_id}·C${c.cell}: Temp ${c.temp}°C`);
    });
    if (s.aqi > 60) alerts.push(`Section ${s.board_id}: High AQI ${s.aqi}`);
  });
  bar.innerHTML = alerts.map(a => `<div class="alert-chip">⚠ ${a}</div>`).join("");
}

function renderSections() {
  document.getElementById("sections-grid").innerHTML = allData.map(renderSection).join("");
}

function renderSection(s) {
  const online = s.online !== false;
  const aqiColor = s.aqi > 60 ? 'var(--red)' : s.aqi > 35 ? 'var(--amber)' : 'var(--green)';
  return `
    <div class="section-card ${online ? "" : "offline"}">
      <div class="section-header">
        <div class="section-title">
          <div class="section-num">S${s.board_id}</div>
          <div class="section-label">
            <h2>Section ${s.board_id}</h2>
            <p>BOARD ID ${s.board_id} · 6 CELLS</p>
          </div>
        </div>
        <span class="status-badge ${online ? "online" : "offline"}">${online ? "● ONLINE" : "○ OFFLINE"}</span>
      </div>
      <div class="section-metrics">
        <div class="metric">
          <div class="metric-label">☀ LIGHT</div>
          <div class="metric-value">${s.light}<span class="metric-unit">%</span></div>
          <div class="metric-bar"><div class="metric-bar-fill" style="width:${s.light}%"></div></div>
        </div>
        <div class="metric">
          <div class="metric-label">💨 AQI PM2.5</div>
          <div class="metric-value" style="color:${aqiColor}">${s.aqi}</div>
          <div class="metric-bar"><div class="metric-bar-fill" style="width:${Math.min(s.aqi,100)}%;background:${aqiColor}"></div></div>
        </div>
        <div class="metric">
          <div class="metric-label">💧 PUMP</div>
          <div class="metric-value ${s.pump ? 'pump-on' : 'pump-off'}">${s.pump ? "ON" : "OFF"}</div>
        </div>
      </div>
      <div class="cells-grid">
        ${(s.cells || []).map(c => renderCell(c, s.board_id)).join("")}
      </div>
    </div>`;
}

function renderCell(c, boardId) {
  const mc = moistureClass(c.moist);
  const tc = tempClass(c.temp);
  const mp = moistPct(c.moist);
  return `
    <div class="cell-card" onclick="openModal(${boardId}, ${c.cell})">
      <div class="cell-header">
        <span class="cell-num">CELL ${c.cell}</span>
        <div class="moist-dot ${mc}"></div>
      </div>
      <div class="cell-readings">
        <div class="reading-row">
          <span class="reading-label">🌡 TEMP</span>
          <span class="reading-val ${tc}">${c.temp}°C</span>
        </div>
        <div class="reading-row">
          <span class="reading-label">💧 HUM</span>
          <span class="reading-val">${c.hum}%</span>
        </div>
        <div class="reading-row">
          <span class="reading-label">🪴 SOIL</span>
          <div class="moist-bar" style="flex:1;margin:0 6px">
            <div class="moist-bar-fill" style="width:${mp}%;background:${moistColor(mc)}"></div>
          </div>
          <span class="reading-val" style="color:${moistColor(mc)}">${mp}%</span>
        </div>
      </div>
    </div>`;
}

// ─── MODAL ───
function openModal(boardId, cellNum) {
  const section = allData.find(s => s.board_id === boardId);
  if (!section) return;
  const cell = section.cells.find(c => c.cell === cellNum);
  if (!cell) return;
  const mc = moistureClass(cell.moist);
  const mp = moistPct(cell.moist);
  const tc = tempClass(cell.temp);
  const tempColor = tc === 'danger' ? 'var(--red)' : tc === 'warn' ? 'var(--amber)' : 'var(--green)';

  document.getElementById("modal-title").textContent = `Section ${boardId} · Cell ${cellNum}`;
  document.getElementById("modal-stats").innerHTML = `
    <div class="modal-stat">
      <div class="s-label">Temperature</div>
      <div class="s-val" style="color:${tempColor}">${cell.temp}<span class="s-unit">°C</span></div>
      <div class="s-note">IDEAL: ${TEMP_LOW}–${TEMP_HIGH}°C</div>
    </div>
    <div class="modal-stat">
      <div class="s-label">Humidity</div>
      <div class="s-val" style="color:var(--blue)">${cell.hum}<span class="s-unit">%</span></div>
      <div class="s-note">RELATIVE</div>
    </div>
    <div class="modal-stat">
      <div class="s-label">Soil Moisture</div>
      <div class="s-val" style="color:${moistColor(mc)}">${mp}<span class="s-unit">%</span></div>
      <div class="s-note" style="color:${moistColor(mc)};text-transform:uppercase">${mc}</div>
    </div>`;
  document.getElementById("modal-overlay").classList.remove("hidden");
}

document.getElementById("modal-close").addEventListener("click", () =>
  document.getElementById("modal-overlay").classList.add("hidden"));
document.getElementById("modal-overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-overlay"))
    document.getElementById("modal-overlay").classList.add("hidden");
});

// ─── STARTUP ───
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("loading-screen").classList.add("done");
    setTimeout(() => document.getElementById("loading-screen").remove(), 500);
  }, 1500);
  fetchData();
  setInterval(fetchData, REFRESH_MS);
});
</script>
</body>
</html>
